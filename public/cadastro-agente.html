<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Agente de Segurança</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="menu-nav">
        <a href="cadastro-cidadao.html">Cidadão</a>
        <a href="cadastro-agente.html" class="active">Agente</a>
        <a href="cadastro-bairro.html">Bairro</a>
        <a href="cadastro-ocorrencia.html">Ocorrência</a>
    </nav>

    <main class="container">
        <form class="formulario" action="/cadastrar-agente" method="POST">
            <h1>Cadastrar Agente</h1>

            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" required>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" required maxlength="14" placeholder="000.000.000-00">

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required>

            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" name="telefone" required placeholder="(00) 00000-0000">

            <label for="matricula">Matrícula Funcional</label>
            <input type="text" id="matricula" name="matricula" required>

            <label for="cargo">Cargo</label>
            <select id="cargo" name="cargo" required>
                <option value="Policial">Policial</option>
                <option value="Guardas">Guardas</option>
                <option value="Bombeiros">Bombeiros</option>
            </select>

            <label for="turno">Turno de trabalho</label>
            <input type="text" id="turno" name="turno" required>

            <button type="submit">Salvar</button>
        </form>
    </main>

<script>
    const parametros = new URLSearchParams(window.location.search);

    if (parametros.get("sucesso") === "true") {
        alert("Agente cadastrado com sucesso!");
    }
</script>
</body>
</html>
