<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cidadão</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="menu-nav">
        <a href="cadastro-cidadao.html" class="active">Cidadão</a>
        <a href="cadastro-agente.html">Agente</a>
        <a href="cadastro-bairro.html">Bairro</a>
        <a href="cadastro-ocorrencia.html">Ocorrência</a>
    </nav>

    <main class="container">
        <form class="formulario" action="/cadastrar-cidadao" method="POST">
            <h1>Cadastrar Cidadão</h1>

            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" required>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" required maxlength="14" placeholder="000.000.000-00">

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required>

            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" name="telefone" required placeholder="(00) 00000-0000">

            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" name="endereco" required>

            <label for="data_nascimento">Data de Nascimento</label>
            <input type="date" id="data_nascimento" name="data_nascimento" required>

            <button type="submit">Salvar</button>
        </form>
    </main>

<script>
    const parametros = new URLSearchParams(window.location.search);

    if (parametros.get("sucesso") === "true") {
        alert("Cidadão cadastrado com sucesso!");
    }
</script>
</body>
</html>
